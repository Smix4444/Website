<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | VOIDFORM</title>
    <meta name="description" content="Speak into the void. Contact VOIDFORM for custom commissions, sizing, and inquiries.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VOIDFORM</a>
        <ul>
            <li><a href="products.html">Collection</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html" id="cart-count">Cart (0)</a></li>
        </ul>
    </nav>

    <main style="margin-top: 80px;">
        <div class="contact-section">
            <p class="font-mono reveal" style="margin-bottom: 1rem; color: var(--text-muted);">Inquiries</p>
            <h1 class="reveal" style="font-size: clamp(2.5rem, 6vw, 5rem); font-family: var(--font-display); text-transform: uppercase; margin-bottom: 1rem;">Voice to<br>the Void</h1>
            <p class="reveal" style="color: var(--text-secondary); margin-bottom: 4rem; max-width: 400px;">For custom commissions, sizing, wholesale, or to make contact with the darkness.</p>

            <form id="contact-form" class="reveal">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required rows="6"></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Transmit</button>
            </form>
            <div class="form-status" id="form-status"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VOIDFORM</p>
        <p>All pieces .925 Sterling Silver</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
