<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT | VOIDFORM</title>
    <meta name="description" content="VOIDFORM product detail. Avant-garde sterling silver jewelry.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">VOIDFORM</a>
        <ul>
            <li><a href="products.html">Collection</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="cart.html" id="cart-count">Cart (0)</a></li>
        </ul>
    </nav>

    <main class="product-detail" id="product-detail">
        <div class="product-image-wrap reveal-left">
            <img id="product-img" src="" alt="">
        </div>
        <div class="product-info-panel">
            <p class="font-mono reveal" id="product-category"></p>
            <h1 class="reveal glitch" data-text="" id="product-name"></h1>
            <p class="price reveal" id="product-price"></p>
            <p class="description reveal" id="product-desc"></p>
            <p class="details reveal" id="product-details"></p>
            <div class="reveal" style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button id="add-to-cart-btn" class="btn-fill btn" style="flex: 1;">Add to Cart</button>
            </div>
            <a href="products.html" class="font-mono reveal" style="color: var(--text-muted); font-size: 0.7rem; margin-top: 2rem; text-decoration: none;">← Back to Collection</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 VOIDFORM</p>
        <p>All pieces .925 Sterling Silver</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/product.js"></script>
</body>
</html>
